services:
  db:
    image: postgres:16-alpine
    container_name: cloudstorage-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cloudstorage}
      POSTGRES_USER: ${DB_USER:-cloudstorage}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cloudstorage}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cloudstorage} -d ${DB_NAME:-cloudstorage}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cloudstorage-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-secret-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DB_NAME: ${DB_NAME:-cloudstorage}
      DB_USER: ${DB_USER:-cloudstorage}
      DB_PASSWORD: ${DB_PASSWORD:-cloudstorage}
      DB_HOST: db
      DB_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      STORAGE_PATH: /app/storage
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      PUBLIC_BASE_URL: http://localhost:8000
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
      - backend_logs:/app/logs
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: cloudstorage-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  pg_data:
  backend_storage:
  backend_logs:
